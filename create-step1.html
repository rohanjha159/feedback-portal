<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Form - Step 1</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"><style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;

  background-color: #fff9c4;
  background-image:
    linear-gradient(#c8e6c9 1px, transparent 1px),
    linear-gradient(90deg, #c8e6c9 1px, transparent 1px);
  background-size: 40px 40px;
}

/* CONTAINER */
.container {
  width: 350px;
  margin: auto;
  margin-top: 120px;
  padding: 30px;
  background: #d2a679;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* INPUT */
select {
  width: 90%;
  padding: 10px;
  margin: 15px 0;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
}

/* LOADER */
.loader-overlay {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background: rgba(255,255,255,0.8);
}

.loader {
  width: 50px;
  aspect-ratio: 1;
  display: grid;
  color: #000;
  background:
    linear-gradient(90deg,currentColor 2px,#0000 0 calc(100% - 2px),currentColor 0) center/100% 14px,
    linear-gradient(0deg, currentColor 2px,#0000 0 calc(100% - 2px),currentColor 0) center/14px 100%,
    linear-gradient(currentColor 0 0) center/100% 2px,
    linear-gradient(currentColor 0 0) center/2px 100%;
  animation: l6 4s infinite linear;
}

@keyframes l6{
  100% {transform:rotate(1turn)}
}
</style></head><body><div class="loader-overlay" id="loader">
  <div class="loader"></div>
</div><div class="container">
  <h2>Create Form</h2>  <p><b>Department:</b> CSE</p>  <select id="sem">
    <option value="">Select Semester</option>
    <option>1</option>
    <option>2</option>
    <option>3</option>
    <option>4</option>
    <option>5</option>
    <option>6</option>
    <option>7</option>
    <option>8</option>
  </select><button onclick="next()">Next</button>

</div><script>
function next(){
  let sem = document.getElementById("sem").value;

  if(sem === ""){
    alert("Please select semester");
    return;
  }

  localStorage.setItem("semester", sem);

  document.getElementById("loader").style.display = "flex";

  setTimeout(()=>{
    window.location.href = "create-step2.html";
  },800);
}
</script></body>
</html>
