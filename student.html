<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login</title><style>
body {
  margin: 0;
  height: 100vh;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;

  background: linear-gradient(
    135deg,
    #fff9c4,
    #dcedc8,
    #f8bbd0,
    #e1bee7,
    #eeeeee
  );
}

/* SHAPES */
.shape {
  position: absolute;
  border-radius: 50%;
  opacity: 0.3;
}

.shape1 { width:200px;height:200px;background:#f8bbd0;top:10%;left:10%; }
.shape2 { width:150px;height:150px;background:#dcedc8;bottom:15%;right:15%; }
.shape3 { width:120px;height:120px;background:#e1bee7;top:50%;left:70%; }

/* BOX */
.container {
  position: relative;
  width: 350px;
  padding: 30px;
  border-radius: 15px;
  background: #ffffff;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  background: #eeeeee;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #eeeeee;
  cursor: pointer;
}

/* 🔥 STUDENT LOADER */
.loader-overlay {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: rgba(255,255,255,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.loader {
  width: 40px;
  aspect-ratio: 1;
  display: grid;
}
.loader::before,
.loader::after {
  content: "";
  grid-area: 1/1;
  background: orange;
  clip-path: polygon(0 0,101% 0, 0 100%);
  animation: l13 2s infinite;
}
.loader::after { --s:-1,-1; }

@keyframes l13 {
  0%,10%{transform:scale(var(--s,1)) translate(0,0)}
  33%{transform:scale(var(--s,1)) translate(20px,-20px)}
  66%{transform:scale(var(--s,1)) translate(20px,-20px) rotate(180deg)}
  100%{transform:scale(var(--s,1)) translate(0,0) rotate(180deg)}
}
</style></head><body><div class="loader-overlay" id="loader">
  <div class="loader"></div>
</div><div class="shape shape1"></div>
<div class="shape shape2"></div>
<div class="shape shape3"></div><div class="container">
  <h2>Student Login</h2>  <input type="text" placeholder="Registration ID">
  <input type="date"><button onclick="login()">Login</button>

</div><script>
function login(){
  document.getElementById("loader").style.display = "flex";

  setTimeout(()=>{
    window.location.href = "student-dashboard.html";
  },800);
}
</script></body>
</html>
