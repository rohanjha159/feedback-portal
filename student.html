<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login</title><style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #11998e, #38ef7d);
  font-family: Arial;
  overflow: hidden;
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  width: 350px;
  color: white;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: black;
  color: white;
}

.transition {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  top: 0;
  left: 0;
  transform: scaleY(0);
  transform-origin: top;
  transition: 0.6s ease-in-out;
}
</style></head><body><div class="transition" id="transition"></div><div class="card">
  <h2>Student Login</h2>  <input type="text" placeholder="Registration ID">
  <input type="date"><button onclick="login()">Login</button>

</div><script>
function login(){
  let t = document.getElementById("transition");
  t.style.transform = "scaleY(1)";

  setTimeout(()=>{
    window.location.href = "student-dashboard.html";
  }, 600);
}
</script></body>
</html>
