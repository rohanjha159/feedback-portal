<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Feedback Form</title><style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;

  background: linear-gradient(
    135deg,
    #fff9c4,
    #dcedc8,
    #f8bbd0,
    #e1bee7,
    #eeeeee
  );
}

/* BOX */
.container {
  width: 400px;
  background: #ffffff;
  padding: 25px;
  border-radius: 15px;
}

.criteria {
  margin: 10px 0;
}

input[type="range"] {
  width: 100%;
}

textarea {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #eeeeee;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #eeeeee;
  cursor: pointer;
}
</style></head><body><div class="container"><h2>Feedback Form</h2><div class="criteria">
Teaching Quality
<input type="range" min="1" max="10">
</div><div class="criteria">
Interaction
<input type="range" min="1" max="10">
</div><div class="criteria">
Punctuality
<input type="range" min="1" max="10">
</div><textarea placeholder="Remarks"></textarea><button onclick="submit()">Submit</button>

</div><script>
function submit(){
  alert("Feedback Submitted (demo)");
}
</script></body>
</html>
