<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Feedback Portal</title><style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

/* MAIN UI */
.container {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  width: 350px;
  color: white;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 10px;
  background: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: black;
  color: white;
  transform: scale(1.05);
}

/* 🔥 PREMIUM TRANSITION OVERLAY */
.transition {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  top: 0;
  left: 0;
  transform: scaleY(0);
  transform-origin: top;
  transition: 0.6s ease-in-out;
  z-index: 999;
}
</style></head><body><div class="transition" id="transition"></div><div class="container">
  <div class="card">
    <h2>Feedback Portal</h2><button onclick="goTo('hod.html')">HOD Login</button>
<button onclick="goTo('student.html')">Student Login</button>

  </div>
</div><script>
function goTo(page){
  let t = document.getElementById("transition");
  t.style.transform = "scaleY(1)";

  setTimeout(()=>{
    window.location.href = page;
  }, 600);
}
</script></body>
</html>
