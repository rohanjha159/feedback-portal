<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Feedback Portal</title><!-- 🔥 PROFESSIONAL FONT --><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"><style>
body {
  margin: 0;
  height: 100vh;
  font-family: 'Poppins', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;

  /* 🔥 LIGHT PURPLE BACKGROUND */
  background: #e6d6f5;
}

/* 🔥 FLOATING SHAPES */
.shape {
  position: absolute;
  opacity: 0.3;
}

.shape1 {
  width: 120px;
  top: 10%;
  left: 10%;
}

.shape2 {
  width: 150px;
  bottom: 10%;
  right: 10%;
}

.shape3 {
  width: 100px;
  top: 50%;
  left: 70%;
}

/* 🔥 MAIN BOX */
.container {
  width: 350px;
  padding: 30px;
  border-radius: 15px;
  background: #ffffff;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  text-align: center;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 14px;
  margin: 12px 0;
  border: none;
  border-radius: 12px;
  background: #eeeeee;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

/* 🔥 HOVER SCALE EFFECT */
button:hover {
  transform: scale(1.1);
}

/* 🔥 LOADER OVERLAY */
.loader-overlay {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: rgba(255,255,255,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

/* 🔥 CUSTOM LOADER (AS YOU GAVE) */
.loader {
  width: 50px;
  aspect-ratio: 1;
  display: grid;
  color: #000;
  background:
    linear-gradient(90deg,currentColor 2px,#0000 0 calc(100% - 2px),currentColor 0) center/100% 14px,
    linear-gradient(0deg, currentColor 2px,#0000 0 calc(100% - 2px),currentColor 0) center/14px 100%,
    linear-gradient(currentColor 0 0) center/100% 2px,
    linear-gradient(currentColor 0 0) center/2px 100%;
  background-repeat: no-repeat;
  animation: l6 4s infinite linear;
}
.loader::before,
.loader::after {
  content: "";
  grid-area: 1/1;
  background: inherit;
  animation: inherit;
}
.loader::after {
  animation-duration: 2s;
}

@keyframes l6{
  100% {transform:rotate(1turn)}
}
</style></head><body><!-- 🔥 LOADER --><div class="loader-overlay" id="loader">
  <div class="loader"></div>
</div><!-- 🔥 CLIPART SHAPES (SVG) --><img src="https://cdn-icons-png.flaticon.com/512/4149/4149645.png" class="shape shape1">
<img src="https://cdn-icons-png.flaticon.com/512/4149/4149678.png" class="shape shape2">
<img src="https://cdn-icons-png.flaticon.com/512/4149/4149653.png" class="shape shape3"><!-- 🔥 MAIN CONTENT --><div class="container">
  <h2>Feedback Portal</h2><button onclick="goTo('hod.html')">HOD Login</button>
<button onclick="goTo('student.html')">Student Login</button>

</div><script>
function goTo(page){
  document.getElementById("loader").style.display = "flex";

  setTimeout(()=>{
    window.location.href = page;
  },800);
}
</script></body>
</html>
