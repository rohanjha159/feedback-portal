<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Feedback Portal</title><style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #667eea, #764ba2);
  font-family: Arial;
}

.container {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  width: 350px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h2 {
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 10px;
  background: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: black;
  color: white;
  transform: scale(1.05);
}
</style></head><body><div class="container">
  <h2>Feedback Portal</h2><button>HOD Login</button>
<button>Student Login</button>

</div></body>
</html>
