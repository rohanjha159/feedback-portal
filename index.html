<!DOCTYPE html><html>
<head>
<title>Feedback Portal</title><style>
body{
margin:0;
font-family:Poppins;
overflow:hidden;

background-color:#fff9c4;
background-image:
linear-gradient(#c8e6c9 1px,transparent 1px),
linear-gradient(90deg,#c8e6c9 1px,transparent 1px);
background-size:40px 40px;
}

/* CANVAS */
canvas{
position:fixed;
top:0;left:0;
z-index:0;
}

/* WOOD FRAME */
.frame{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:2;

background:#8b5a2b;
padding:15px;
border-radius:12px;
}

/* INNER */
.container{
background:#d2a679;
padding:25px;
border-radius:10px;
text-align:center;
}

/* NAILS */
.nail{
width:12px;height:12px;
background:radial-gradient(circle,#ddd,#666);
border-radius:50%;
position:absolute;
}
.n1{top:5px;left:5px}
.n2{top:5px;right:5px}
.n3{bottom:5px;left:5px}
.n4{bottom:5px;right:5px}

/* BUTTON */
button{
display:block;
width:200px;
padding:12px;
margin:10px auto;
cursor:pointer;
font-size:15px;
}

button:hover{
transform:scale(1.05);
transition:0.3s;
}

/* LOADER */
.loader-overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(255,255,255,0.9);
z-index:999;
}

/* TERA LOADER */
.loader {
  width: 25px;
  height: 50px;
  display: grid;
  color: #000;
  background:
    linear-gradient(currentColor 0 0) top/100% 2px,
    radial-gradient(farthest-side at  top,#0000 calc(100% - 2px),currentColor calc(100% - 1px),#0000) top,
    linear-gradient(currentColor 0 0) bottom/100% 2px,
    radial-gradient(farthest-side at  bottom,#0000 calc(100% - 2px),currentColor calc(100% - 1px),#0000) bottom;
  background-size:100% 1px,100% 50%;
  background-repeat:no-repeat;
  animation:l18 4s infinite linear;
}
.loader::before,
.loader::after {
  content:"";
  grid-area:1/1;
  background:inherit;
  border:inherit;
  animation:inherit;
}
.loader::after {animation-duration:2s}
@keyframes l18{100%{transform:rotate(1turn)}}
</style></head><body><!-- LOADER --><div class="loader-overlay" id="loader">
<div class="loader"></div>
</div><canvas id="canvas"></canvas>

<div class="frame"><div class="nail n1"></div>
<div class="nail n2"></div>
<div class="nail n3"></div>
<div class="nail n4"></div><div class="container">
<h2>Feedback Portal</h2><button onclick="goTo('hod.html')">HoD Login</button>
<button onclick="goTo('student.html')">Student Login</button>

</div>
</div><script>

/* NAVIGATION */
function goTo(page){
document.getElementById("loader").style.display="flex";

setTimeout(()=>{
window.location=page;
},800);
}

/* SHAPES */
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

const colors=["#ffcdd2","#bbdefb","#c8e6c9","#f8bbd0","#e1bee7"];

class Shape{
constructor(){
this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;
this.dx=(Math.random()-0.5)*0.6;
this.dy=(Math.random()-0.5)*0.6;
this.size=12+Math.random()*10;
this.color=colors[Math.floor(Math.random()*colors.length)];
this.type=Math.floor(Math.random()*5);
}

draw(){
ctx.fillStyle=this.color;

if(this.type===0){
ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();
}
else if(this.type===1){
ctx.fillRect(this.x,this.y,this.size,this.size);
}
else if(this.type===2){
ctx.fillRect(this.x,this.y,this.size*1.5,this.size);
}
else{
drawPoly(this.x,this.y,6,this.size);
}
}

update(){
this.x+=this.dx;
this.y+=this.dy;

if(this.x<0||this.x>canvas.width)this.dx*=-1;
if(this.y<0||this.y>canvas.height)this.dy*=-1;
}
}

function drawPoly(x,y,sides,size){
ctx.beginPath();
for(let i=0;i<sides;i++){
let angle=(i/sides)*Math.PI*2;
let px=x+Math.cos(angle)*size;
let py=y+Math.sin(angle)*size;
if(i===0)ctx.moveTo(px,py);
else ctx.lineTo(px,py);
}
ctx.closePath();
ctx.fill();
}

let shapes=[];
for(let i=0;i<50;i++)shapes.push(new Shape());

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
shapes.forEach(s=>{s.update();s.draw();});
requestAnimationFrame(animate);
}
animate();

</script></body>
</html>
