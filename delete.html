<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Delete Data</title><style>
body {
  margin: 0;
  height: 100vh;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;

  background: linear-gradient(
    135deg,
    #fff9c4,
    #f8bbd0,
    #eeeeee
  );
}

.container {
  background: #ffffff;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: red;
  color: white;
  cursor: pointer;
}

/* LOADER */
.loader-overlay {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: rgba(255,255,255,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.loader {
  width: 50px;
  aspect-ratio: 1.154;
  display: grid;
  color: #000;
  background:
    linear-gradient(to bottom left ,#0000 calc(50% - 1px),currentColor 0 calc(50% + 1px),#0000 0) right/50% 100%,
    linear-gradient(to bottom right,#0000 calc(50% - 1px),currentColor 0 calc(50% + 1px),#0000 0) left /50% 100%,
    linear-gradient(currentColor 0 0) bottom/100% 2px;
  animation: l5 4s infinite linear;
}
@keyframes l5{
  100% {transform:rotate(1turn)}
}
</style></head><body><div class="loader-overlay" id="loader">
  <div class="loader"></div>
</div><div class="container">
  <h2>Delete All Data</h2>
  <button onclick="del()">Delete</button>
</div><script>
function del(){
  document.getElementById("loader").style.display = "flex";

  setTimeout(()=>{
    alert("All data deleted (demo)");
  },800);
}
</script></body>
</html>
