d<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Delete Data</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"><style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;

  background-color: #fff9c4;
  background-image:
    linear-gradient(#c8e6c9 1px, transparent 1px),
    linear-gradient(90deg, #c8e6c9 1px, transparent 1px);
  background-size: 40px 40px;
}

.container {
  width: 350px;
  margin: auto;
  margin-top: 120px;
  padding: 25px;
  background: #d2a679;
  border-radius: 10px;
  text-align: center;
}

select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

/* WARNING BOX */
.warning {
  display: none;
  background: #fff;
  padding: 15px;
  margin-top: 15px;
  border-radius: 8px;
}

.confirm {
  background: red;
  color: white;
}

.cancel {
  background: grey;
  color: white;
}
</style></head><body><div class="container">  <h2>Delete Data</h2>  <select id="sem">
    <option>1</option>
    <option>2</option>
    <option>3</option>
    <option>4</option>
    <option>5</option>
    <option>6</option>
    <option>7</option>
    <option>8</option>
  </select><button onclick="showWarning()">Delete Data</button>

  <div class="warning" id="warn">
    <p><b>This will delete all data!</b></p><button class="confirm" onclick="deleteData()">Confirm</button>
<button class="cancel" onclick="cancel()">Deny</button>

  </div></div><script>

function showWarning(){
  document.getElementById("warn").style.display = "block";
}

function cancel(){
  document.getElementById("warn").style.display = "none";
}

function deleteData(){

  /* 🔥 TEMP DELETE */
  localStorage.clear();

  alert("All Data Deleted ✅");

  window.location.href = "dashboard.html";
}

</script></body>
</html>
