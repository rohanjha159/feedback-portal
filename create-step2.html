<!DOCTYPE html><html>
<head>
<title>Subjects</title>
<style>
body{margin:0;background:#fff9c4;font-family:Poppins}/* layout */
.main{display:flex;justify-content:center;margin-top:50px}

/* left input */
.box{background:#d2a679;padding:20px;border-radius:10px}

/* right list */
.list{
background:#fff;padding:10px;width:200px;margin-left:20px;
max-height:250px;overflow-y:auto;
}

li{background:#eee;margin:5px;padding:5px;display:flex;justify-content:space-between}
.remove{background:red;color:white}
</style>

</head><body><div class="main"><div class="box">
<h3>Add Subject</h3>
<input id="sub" placeholder="Subject"><br>
<input id="prof" placeholder="Professor"><br>
<button onclick="add()">Add</button>
</div><div class="list">
<ul id="list"></ul>
</div></div><script>
let data=[];

function add(){
let s=sub.value;
let p=prof.value;

if(!s||!p)return alert("Fill both");

data.push({s,p});
render();

sub.value="";prof.value="";
}

function render(){
list.innerHTML="";
data.forEach((d,i)=>{
let li=document.createElement("li");
li.innerHTML=d.s+"-"+d.p+
<button class="remove" onclick="del(${i})">X</button>;
list.appendChild(li);
});
}

function del(i){
data.splice(i,1);
render();
}
</script></body>
</html>
