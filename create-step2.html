<!DOCTYPE html><html>
<head>
<title>Add Subjects</title><style>
body {
  margin: 0;
  font-family: Poppins;
  overflow-y: auto;

  background-color: #fff9c4;
  background-image:
    linear-gradient(#c8e6c9 1px, transparent 1px),
    linear-gradient(90deg, #c8e6c9 1px, transparent 1px);
  background-size: 40px 40px;
}

/* CANVAS */
canvas{position:fixed;top:0;left:0;z-index:0}

/* MAIN */
.main{
  position:relative;
  z-index:2;
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:80px;
  flex-wrap:wrap;
}

/* WOOD */
.box,.side{
  background:#8b5a2b;
  padding:12px;
  border-radius:12px;
  position:relative;
}

/* NAILS */
.nail{
  width:10px;height:10px;
  background:radial-gradient(circle,#ddd,#666);
  border-radius:50%;
  position:absolute;
}
.n1{top:5px;left:5px}
.n2{top:5px;right:5px}
.n3{bottom:5px;left:5px}
.n4{bottom:5px;right:5px}

/* INNER */
.inner-box,.inner-side{
  background:#d2a679;
  padding:15px;
  border-radius:10px;
}

.inner-box{width:260px;text-align:center}

.inner-side{
  width:300px;
  max-height:300px;
  overflow-y:auto;
}

/* INPUT */
input{
  width:90%;
  padding:10px;
  margin:8px 0;
}

/* BUTTON */
button{
  width:95%;
  padding:10px;
  cursor:pointer;
}

/* LIST */
ul{list-style:none;padding:0}

li{
  background:#eee;
  margin:6px 0;
  padding:6px;
  border-radius:6px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:14px;
}

/* SMALL REMOVE */
.remove{
  background:red;
  color:white;
  border:none;
  padding:2px 6px;
  font-size:12px;
}

/* NEXT BUTTON */
.next-btn{
  position:fixed;
  bottom:15px;
  right:20px;
  padding:12px 20px;
  background:#8b5a2b;
  color:white;
  border:none;
  border-radius:8px;
  z-index:5;
}

/* LOADER */
.loader-overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(255,255,255,0.9);
  z-index:999;
}

/* TERA LOADER */
.loader {
  width: 25px;
  height: 50px;
  display: grid;
  color: #000;
  background:
    linear-gradient(currentColor 0 0) top/100% 2px,
    radial-gradient(farthest-side at  top, #0000 calc(100% - 2px),currentColor calc(100% - 1px) ,#0000) top,
    linear-gradient(currentColor 0 0) bottom/100% 2px,
    radial-gradient(farthest-side at  bottom, #0000 calc(100% - 2px),currentColor calc(100% - 1px) ,#0000) bottom;
  background-size: 100% 1px,100% 50%; 
  background-repeat: no-repeat;
  animation: l18 4s infinite linear;
}
.loader::before,
.loader::after {
  content: "";
  grid-area: 1/1;
  background: inherit;
  animation: inherit;
}
.loader::after {
  animation-duration: 2s;
}
@keyframes l18 {
  100% {transform: rotate(1turn)}
}
</style></head><body><!-- LOADER --><div class="loader-overlay" id="loader">
  <div class="loader"></div>
</div><canvas id="canvas"></canvas>

<div class="main"><!-- LEFT --><div class="box">
<div class="nail n1"></div>
<div class="nail n2"></div>
<div class="nail n3"></div>
<div class="nail n4"></div><div class="inner-box">
<h3>Add Subject</h3><input id="sub" placeholder="Subject Name">
<input id="prof" placeholder="Professor Name"><button onclick="add()">Add</button>

</div>
</div><!-- RIGHT --><div class="side">
<div class="nail n1"></div>
<div class="nail n2"></div>
<div class="nail n3"></div>
<div class="nail n4"></div><div class="inner-side">
<h4>Added Subjects</h4>
<ul id="list"></ul>
</div>
</div></div><!-- NEXT BUTTON --><button class="next-btn" onclick="nextStep()">Next</button>

<script>

let data=[];

/* ADD */
function add(){
let s=sub.value.trim();
let p=prof.value.trim();

if(!s||!p){
alert("Fill both fields");
return;
}

data.push({s,p});
render();

sub.value="";
prof.value="";
}

/* RENDER */
function render(){
list.innerHTML="";

data.forEach((d,i)=>{
let li=document.createElement("li");

li.innerHTML=`
<span>${d.s} - ${d.p}</span>
<button class="remove" onclick="remove(${i})">X</button>
`;

list.appendChild(li);
});
}

/* REMOVE */
function remove(i){
data.splice(i,1);
render();
}

/* NEXT */
function nextStep(){

if(data.length===0){
alert("Add at least one subject");
return;
}

localStorage.setItem("subjects",JSON.stringify(data));

document.getElementById("loader").style.display="flex";

setTimeout(()=>{
window.location="create-step3.html";
},800);
}

/* SHAPES */
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

const colors=["#ffcdd2","#bbdefb","#c8e6c9","#f8bbd0","#e1bee7"];

class Shape{
constructor(){
this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;
this.dx=(Math.random()-0.5)*0.8;
this.dy=(Math.random()-0.5)*0.8;
this.size=12+Math.random()*8;
this.color=colors[Math.floor(Math.random()*colors.length)];
this.type=Math.floor(Math.random()*5);
}

draw(){
ctx.fillStyle=this.color;

if(this.type===0){
ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();
}
else if(this.type===1){
ctx.fillRect(this.x,this.y,this.size,this.size);
}
else if(this.type===2){
ctx.fillRect(this.x,this.y,this.size*1.5,this.size);
}
else{
drawPoly(this.x,this.y,5,this.size);
}
}

update(){
this.x+=this.dx;
this.y+=this.dy;

if(this.x<0||this.x>canvas.width)this.dx*=-1;
if(this.y<0||this.y>canvas.height)this.dy*=-1;
}
}

function drawPoly(x,y,sides,size){
ctx.beginPath();
for(let i=0;i<sides;i++){
let angle=(i/sides)*Math.PI*2;
let px=x+Math.cos(angle)*size;
let py=y+Math.sin(angle)*size;
if(i===0)ctx.moveTo(px,py);
else ctx.lineTo(px,py);
}
ctx.closePath();
ctx.fill();
}

let shapes=[];
for(let i=0;i<40;i++)shapes.push(new Shape());

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
shapes.forEach(s=>{s.update();s.draw();});
requestAnimationFrame(animate);
}
animate();

</script></body>
</html>
