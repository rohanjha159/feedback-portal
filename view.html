<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>View Feedback</title><style>
body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  font-family: Arial;
  color: white;
  padding: 20px;
}

/* HEADER */
h2 {
  text-align: center;
}

/* BOX */
.box {
  max-width: 600px;
  margin: auto;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 20px;
  border-radius: 20px;
}

/* SELECT */
select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

/* FEEDBACK CARD */
.card {
  background: rgba(0,0,0,0.3);
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
}
</style></head><body><h2>View Feedback</h2><div class="box"><label>Select Semester</label>
<select>

  <option>Semester 1</option>
  <option>Semester 2</option>
  <option>Semester 3</option>
</select><div class="card">
  <p><b>Student:</b> Rahul</p>
  <p>Teaching: 8</p>
  <p>Interaction: 9</p>
  <p>Remarks: Good teaching</p>
</div><div class="card">
  <p><b>Student:</b> Aman</p>
  <p>Teaching: 7</p>
  <p>Interaction: 8</p>
  <p>Remarks: Nice</p>
</div></div></body>
</html>
