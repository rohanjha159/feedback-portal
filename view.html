<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>View Responses</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"><style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;

  background-color: #fff9c4;
  background-image:
    linear-gradient(#c8e6c9 1px, transparent 1px),
    linear-gradient(90deg, #c8e6c9 1px, transparent 1px);
  background-size: 40px 40px;
}

.container {
  width: 350px;
  margin: auto;
  margin-top: 120px;
  padding: 25px;
  background: #d2a679;
  border-radius: 10px;
  text-align: center;
}

select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
</style></head><body><div class="container">
  <h2>Select Semester</h2>  <select id="sem">
    <option>1</option>
    <option>2</option>
    <option>3</option>
  </select><button onclick="next()">View</button>

</div><script>
function next(){
  let sem = document.getElementById("sem").value;
  localStorage.setItem("viewSem", sem);
  window.location.href = "view-list.html";
}
</script></body>
</html>
