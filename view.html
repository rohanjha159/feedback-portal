<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>View Feedback</title><style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial;
  padding: 20px;

  background: linear-gradient(
    135deg,
    #fff9c4,
    #dcedc8,
    #f8bbd0,
    #e1bee7,
    #eeeeee
  );
}

.box {
  max-width: 500px;
  margin: auto;
  background: #ffffff;
  padding: 20px;
  border-radius: 15px;
}

.card {
  background: #eeeeee;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

/* LOADER */
.loader-overlay {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: rgba(255,255,255,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.loader {
  width: 50px;
  aspect-ratio: 1.154;
  display: grid;
  color: #000;
  background:
    linear-gradient(to bottom left ,#0000 calc(50% - 1px),currentColor 0 calc(50% + 1px),#0000 0) right/50% 100%,
    linear-gradient(to bottom right,#0000 calc(50% - 1px),currentColor 0 calc(50% + 1px),#0000 0) left /50% 100%,
    linear-gradient(currentColor 0 0) bottom/100% 2px;
  animation: l5 4s infinite linear;
}
@keyframes l5{
  100% {transform:rotate(1turn)}
}
</style></head><body><div class="loader-overlay" id="loader">
  <div class="loader"></div>
</div><div class="box">
  <h2>Feedback List</h2>  <div class="card">
    Teaching: 8 <br>
    Interaction: 9 <br>
    Remark: Good
  </div>  <div class="card">
    Teaching: 7 <br>
    Interaction: 8 <br>
    Remark: Nice
  </div>
</div></body>
</html>
