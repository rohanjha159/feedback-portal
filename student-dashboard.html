<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title><style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #134e5e, #71b280);
  font-family: Arial;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.container {
  text-align: center;
}

button {
  padding: 14px 25px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  background: black;
  color: white;
}

.transition {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  top: 0;
  left: 0;
  transform: scaleY(0);
  transform-origin: top;
  transition: 0.6s ease-in-out;
}
</style></head><body><div class="transition" id="transition"></div><div class="container"><h2>Select Department</h2><button onclick="go()">CSE</button>
<button onclick="go()">EEE</button>

</div><script>
function go(){
  let t = document.getElementById("transition");
  t.style.transform = "scaleY(1)";

  setTimeout(()=>{
    window.location.href = "feedback.html";
  }, 600);
}
</script></body>
</html>
