<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title><style>
body {
  margin: 0;
  height: 100vh;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;

  background: linear-gradient(
    135deg,
    #fff9c4,
    #dcedc8,
    #f8bbd0,
    #e1bee7,
    #eeeeee
  );
}

/* SHAPES */
.shape {
  position: absolute;
  border-radius: 50%;
  opacity: 0.3;
}

.shape1 { width:200px;height:200px;background:#f8bbd0;top:10%;left:10%; }
.shape2 { width:150px;height:150px;background:#dcedc8;bottom:15%;right:15%; }
.shape3 { width:120px;height:120px;background:#e1bee7;top:50%;left:70%; }

/* BOX */
.container {
  display: flex;
  gap: 20px;
}

/* BUTTON CARDS */
.card {
  width: 150px;
  height: 120px;
  background: #ffffff;
  border-radius: 15px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.08);
}

/* 🔥 STUDENT LOADER */
.loader-overlay {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: rgba(255,255,255,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.loader {
  width: 40px;
  aspect-ratio: 1;
  display: grid;
}
.loader::before,
.loader::after {
  content: "";
  grid-area: 1/1;
  background: orange;
  clip-path: polygon(0 0,101% 0, 0 100%);
  animation: l13 2s infinite;
}
.loader::after { --s:-1,-1; }

@keyframes l13 {
  0%,10%{transform:scale(var(--s,1)) translate(0,0)}
  33%{transform:scale(var(--s,1)) translate(20px,-20px)}
  66%{transform:scale(var(--s,1)) translate(20px,-20px) rotate(180deg)}
  100%{transform:scale(var(--s,1)) translate(0,0) rotate(180deg)}
}
</style></head><body><div class="loader-overlay" id="loader">
  <div class="loader"></div>
</div><div class="shape shape1"></div>
<div class="shape shape2"></div>
<div class="shape shape3"></div><div class="container">  <div class="card" onclick="goTo('feedback.html')">
    CSE
  </div>  <div class="card" onclick="goTo('feedback.html')">
    EEE
  </div></div><script>
function goTo(page){
  document.getElementById("loader").style.display = "flex";

  setTimeout(()=>{
    window.location.href = page;
  },800);
}
</script></body>
</html>
