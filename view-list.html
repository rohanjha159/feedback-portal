<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Responses</title><style>
body {
  font-family: Poppins;
  background: #fff9c4;
}

.container {
  width: 400px;
  margin: auto;
  margin-top: 80px;
}

li {
  background: #eee;
  margin: 8px;
  padding: 10px;
  cursor: pointer;
}
</style></head><body><div class="container">
  <h2>Students</h2>
  <ul id="list"></ul>
</div><script>

/* TEMP DATA (baad me DB se aayega) */
let students = JSON.parse(localStorage.getItem("students")) || [];

let list = document.getElementById("list");

students.forEach((s,i)=>{
  let li = document.createElement("li");
  li.innerText = s.name;

  li.onclick = ()=>{
    localStorage.setItem("selectedStudent", i);
    window.location.href = "view-detail.html";
  };

  list.appendChild(li);
});

</script></body>
</html>
